<section class="calc">
  <div
    class="calc__inner"
    [class.calc__inner--done]="complete()"
    role="status"
    aria-live="polite"
    aria-atomic="true"
  >
    @if (step(); as s) {
      @for (item of [s]; track item.text) {
        <p class="calc__phrase">
          @if (item.carrierId) {
            <app-insurer-logo class="calc__phrase-logo" [id]="item.carrierId" [name]="item.text" />
          }
          <span>{{ item.text }}</span>
        </p>
      }
    }

    <div class="calc__line" role="progressbar" aria-label="Идёт расчёт"><i></i></div>

    @if (complete()) {
      <span class="calc__sr">Расчёт завершён</span>
    }
  </div>

  @if (!complete()) {
    <app-back-link class="calc__cancel" label="Вернуться к данным" (back)="cancelled.emit()" />
  }
</section>

<div class="login-shell">
  <main class="login-card">
    <img src="/images/logo.png" alt="Agent Academy" class="login-logo" />

    <h1 class="login-title">Вход в платформу</h1>
    <p class="login-subtitle">Войдите, чтобы продолжить работу с полисами и клиентами</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form" novalidate>
      <label class="login-field">
        <span class="login-field__label">Номер телефона</span>
        <input
          type="tel"
          autocomplete="tel"
          inputmode="tel"
          formControlName="login"
          placeholder="+7 (___) ___-__-__"
          class="login-field__input"
        />
      </label>

      <label class="login-field">
        <span class="login-field__label-row">
          <span class="login-field__label">Пароль</span>
          <a class="login-field__forgot" routerLink="/forgot-password" tabindex="-1">
            Забыли пароль?
          </a>
        </span>
        <span class="login-field__input-wrap">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            autocomplete="current-password"
            formControlName="password"
            class="login-field__input login-field__input--with-action"
          />
          <button
            type="button"
            class="login-field__toggle"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword() ? 'Скрыть пароль' : 'Показать пароль'"
            [attr.aria-pressed]="showPassword()"
          >
            @if (showPassword()) {
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                <path
                  d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"
                />
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                <line x1="2" y1="2" x2="22" y2="22" />
              </svg>
            } @else {
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            }
          </button>
        </span>
      </label>

      @if (error(); as message) {
        <div class="login-error" role="alert">
          {{ message }}
        </div>
      }

      <button type="submit" [disabled]="form.invalid || loading()" class="login-submit">
        {{ loading() ? 'Входим…' : 'Войти' }}
      </button>
    </form>

    <p class="login-help">Если у вас проблемы со входом, обратитесь к вашему куратору.</p>
  </main>

  <footer class="login-footer">
    <p>© {{ currentYear }} Agent Academy. Платформа для страховых агентов.</p>
  </footer>
</div>

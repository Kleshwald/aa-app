name: Deploy to GitHub Pages

# Закрытое демо: каждый пуш в main собирает прод-сборку Angular и публикует её
# на GitHub Pages. Доступ к приложению закрыт тестовым логином/паролем на форме
# входа (см. STATUS.md), а index.html помечен noindex.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci
        env:
          HUSKY: '0' # не ставить git-хуки в CI

      - name: Build (base-href = /<repo>/)
        run: npx ng build --base-href "/${GITHUB_REPOSITORY#*/}/"

      - name: SPA fallback + .nojekyll
        run: |
          cp dist/agent-academy/browser/index.html dist/agent-academy/browser/404.html
          touch dist/agent-academy/browser/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/agent-academy/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
